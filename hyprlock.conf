# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#

# $font = Monospace
$font = ProggyClean Nerd Font
# $font = BigBlueTerm437 Nerd Font

general {
    hide_cursor = true
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = /home/andrew/.dotfiles/wallpapers/wallpaper_1.jpg
    blur_passes = 0
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 6

    inner_color = rgba(24083fff) 
    outer_color = rgba(dc39e499) rgba(db78d3ff) 45deg
    check_color = rgba(dc39e499) rgba(db78d3ff) 45deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(edacdd)
    fade_on_empty = false
    rounding = -1

    font_family = $font
    placeholder_text = 
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    hide_input = false

    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 120
    font_family = $font

    position = 0, -110
    halign = center
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = 0, -230
    halign = center
    valign = top
}

# Draw a circle around the time/date labels
shape {
    monitor =
    size = 520, 175
    color = rgba(0, 0, 0, 0.8) # no fill
    rounding = -1
    border_size = 8
    border_color = rgba(c530f2ff) rgba(edacddff) 120 deg

    position = 0, -100
    halign = center
    valign = top
}
